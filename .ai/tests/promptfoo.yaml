# FrontX Prompt Testing Configuration
# Validates AI commands follow architecture patterns

description: FrontX AI Command Quality Tests

# Define prompts with raw option to avoid template parsing
prompts:
  - id: frontx-new-screenset
    raw: file://../commands/user/frontx-new-screenset.md
  - id: frontx-new-screen
    raw: file://../commands/user/frontx-new-screen.md
  - id: frontx-validate
    raw: file://../commands/user/frontx-validate.md
  - id: frontx-fix-violation
    raw: file://../commands/user/frontx-fix-violation.md

providers:
  - id: echo
    config:
      passthrough: true

tests:
  # Test: frontx-new-screenset structure
  - description: frontx-new-screenset delegates to CLI
    vars:
      prompt: frontx-new-screenset
    assert:
      - type: contains
        value: "frontx screenset create"
      - type: contains
        value: "AI WORKFLOW"
      - type: contains
        value: "SCREENSETS.md"
      - type: javascript
        value: |
          output.includes('REQUIRED') ||
          output.includes('FORBIDDEN') ||
          output.includes('STOP')

  # Test: frontx-new-screen structure
  - description: frontx-new-screen has workflow
    vars:
      prompt: frontx-new-screen
    assert:
      - type: contains
        value: "AI WORKFLOW"
      - type: contains
        value: "SCREENSETS.md"

  # Test: frontx-validate structure
  - description: frontx-validate references guidelines
    vars:
      prompt: frontx-validate
    assert:
      - type: contains
        value: "GUIDELINES.md"
      - type: contains
        value: "AI WORKFLOW"

  # Test: frontx-fix-violation structure
  - description: frontx-fix-violation has workflow
    vars:
      prompt: frontx-fix-violation
    assert:
      - type: contains
        value: "AI WORKFLOW"
      - type: contains
        value: "GUIDELINES.md"

  # Test: Commands dont implement file operations
  - description: Commands dont use direct fs operations
    vars: {}
    assert:
      - type: not-contains
        value: "import fs from"
      - type: not-contains
        value: "writeFileSync"
      - type: not-contains
        value: "fs.mkdir"

# Output configuration
outputPath: .ai/tests/results.json

# Evaluation settings
evaluateOptions:
  maxConcurrency: 1
