# @cpt-FEATURE:cpt-hai3-dod-publishing-pipeline-ci-workflow:p1
# @cpt-FEATURE:cpt-hai3-flow-publishing-pipeline-publish-on-merge:p1
# @cpt-FEATURE:cpt-hai3-flow-publishing-pipeline-publish-single-package:p1
# @cpt-FEATURE:cpt-hai3-algo-publishing-pipeline-detect-version-changes:p1
# @cpt-FEATURE:cpt-hai3-algo-publishing-pipeline-layer-sort:p1
# @cpt-FEATURE:cpt-hai3-algo-publishing-pipeline-resolve-dist-tag:p1
# @cpt-FEATURE:cpt-hai3-algo-publishing-pipeline-publish-with-retry:p1
# @cpt-FEATURE:cpt-hai3-state-publishing-pipeline-workflow-run:p1
# @cpt-FEATURE:cpt-hai3-state-publishing-pipeline-package-publish:p1
# @cpt-FEATURE:cpt-hai3-dod-publishing-pipeline-idempotent-check:p1
# @cpt-FEATURE:cpt-hai3-dod-publishing-pipeline-version-alignment:p1
# @cpt-FEATURE:cpt-hai3-dod-publishing-pipeline-metadata-contract:p1
name: Publish Packages

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  # @cpt-begin:cpt-hai3-flow-publishing-pipeline-publish-on-merge:p1:inst-1
  # @cpt-begin:cpt-hai3-algo-publishing-pipeline-detect-version-changes:p1:inst-1
  # @cpt-begin:cpt-hai3-state-publishing-pipeline-workflow-run:p1:inst-1
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      packages: ${{ steps.detect.outputs.packages }}
      has_changes: ${{ steps.detect.outputs.has_changes }}

    steps:
      # @cpt-begin:cpt-hai3-flow-publishing-pipeline-publish-on-merge:p1:inst-checkout
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history needed for github.event.before comparison
      # @cpt-end:cpt-hai3-flow-publishing-pipeline-publish-on-merge:p1:inst-checkout

      - name: Detect version changes
        id: detect
        run: |
          PACKAGES=()

          # @cpt-begin:cpt-hai3-algo-publishing-pipeline-detect-version-changes:p1:inst-base-commit
          # Compare HEAD with the state before push (works for all merge strategies)
          BASE_COMMIT="${{ github.event.before }}"
          echo "Comparing HEAD against pre-push state: $BASE_COMMIT"
          # @cpt-end:cpt-hai3-algo-publishing-pipeline-detect-version-changes:p1:inst-base-commit

          # @cpt-begin:cpt-hai3-flow-publishing-pipeline-publish-on-merge:p1:inst-iter-packages
          # @cpt-begin:cpt-hai3-algo-publishing-pipeline-detect-version-changes:p1:inst-diff-check
          # Check each package for version changes
          for pkg_dir in packages/*/; do
            pkg_name=$(basename "$pkg_dir")
            pkg_json="${pkg_dir}package.json"

            if git diff "$BASE_COMMIT" --name-only | grep -q "$pkg_json"; then
              # @cpt-begin:cpt-hai3-algo-publishing-pipeline-detect-version-changes:p1:inst-read-versions
              # Get old and new versions
              OLD_VERSION=$(git show "$BASE_COMMIT":"$pkg_json" 2>/dev/null | jq -r '.version' || echo "")
              NEW_VERSION=$(jq -r '.version' "$pkg_json")
              NPM_NAME=$(jq -r '.name' "$pkg_json")
              # @cpt-end:cpt-hai3-algo-publishing-pipeline-detect-version-changes:p1:inst-read-versions

              # @cpt-begin:cpt-hai3-flow-publishing-pipeline-publish-on-merge:p1:inst-detect-version-change
              # @cpt-begin:cpt-hai3-algo-publishing-pipeline-detect-version-changes:p1:inst-add-candidate
              if [ "$OLD_VERSION" != "$NEW_VERSION" ] && [ -n "$NEW_VERSION" ]; then
                echo "Version change detected: $NPM_NAME $OLD_VERSION -> $NEW_VERSION"
                PACKAGES+=("{\"name\":\"$NPM_NAME\",\"dir\":\"$pkg_name\",\"version\":\"$NEW_VERSION\"}")
              fi
              # @cpt-end:cpt-hai3-algo-publishing-pipeline-detect-version-changes:p1:inst-add-candidate
              # @cpt-end:cpt-hai3-flow-publishing-pipeline-publish-on-merge:p1:inst-detect-version-change
            fi
          done
          # @cpt-end:cpt-hai3-algo-publishing-pipeline-detect-version-changes:p1:inst-diff-check
          # @cpt-end:cpt-hai3-flow-publishing-pipeline-publish-on-merge:p1:inst-iter-packages

          # @cpt-begin:cpt-hai3-flow-publishing-pipeline-publish-on-merge:p1:inst-no-changes-exit
          # @cpt-begin:cpt-hai3-algo-publishing-pipeline-detect-version-changes:p1:inst-return-candidates
          # @cpt-begin:cpt-hai3-state-publishing-pipeline-workflow-run:p1:inst-no-changes
          if [ ${#PACKAGES[@]} -eq 0 ]; then
            echo "No packages with version changes"
            echo "packages=[]" >> $GITHUB_OUTPUT
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            # Use -c for compact single-line JSON (required for GITHUB_OUTPUT)
            JSON_ARRAY=$(printf '%s\n' "${PACKAGES[@]}" | jq -sc '.')
            echo "packages=$JSON_ARRAY" >> $GITHUB_OUTPUT
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi
          # @cpt-end:cpt-hai3-state-publishing-pipeline-workflow-run:p1:inst-no-changes
          # @cpt-end:cpt-hai3-algo-publishing-pipeline-detect-version-changes:p1:inst-return-candidates
          # @cpt-end:cpt-hai3-flow-publishing-pipeline-publish-on-merge:p1:inst-no-changes-exit
  # @cpt-end:cpt-hai3-algo-publishing-pipeline-detect-version-changes:p1:inst-1
  # @cpt-end:cpt-hai3-state-publishing-pipeline-workflow-run:p1:inst-1

  # @cpt-begin:cpt-hai3-flow-publishing-pipeline-publish-on-merge:p1:inst-2
  # @cpt-begin:cpt-hai3-flow-publishing-pipeline-publish-single-package:p1:inst-1
  # @cpt-begin:cpt-hai3-algo-publishing-pipeline-resolve-dist-tag:p1:inst-1
  # @cpt-begin:cpt-hai3-algo-publishing-pipeline-publish-with-retry:p1:inst-1
  # @cpt-begin:cpt-hai3-algo-publishing-pipeline-layer-sort:p1:inst-1
  # @cpt-begin:cpt-hai3-state-publishing-pipeline-workflow-run:p1:inst-2
  # @cpt-begin:cpt-hai3-state-publishing-pipeline-package-publish:p1:inst-1
  # @cpt-begin:cpt-hai3-dod-publishing-pipeline-idempotent-check:p1:inst-1
  publish:
    needs: detect-changes
    if: needs.detect-changes.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    outputs:
      published: ${{ steps.publish.outputs.published }}
      skipped: ${{ steps.publish.outputs.skipped }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '25.x'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Enable Corepack
        run: corepack enable

      # @cpt-begin:cpt-hai3-flow-publishing-pipeline-publish-on-merge:p1:inst-install-deps
      - name: Install dependencies
        run: npm ci
      # @cpt-end:cpt-hai3-flow-publishing-pipeline-publish-on-merge:p1:inst-install-deps

      # @cpt-begin:cpt-hai3-flow-publishing-pipeline-publish-on-merge:p1:inst-build-packages
      # @cpt-begin:cpt-hai3-state-publishing-pipeline-workflow-run:p1:inst-build-done
      - name: Build all packages
        run: npm run build:packages
      # @cpt-end:cpt-hai3-state-publishing-pipeline-workflow-run:p1:inst-build-done
      # @cpt-end:cpt-hai3-flow-publishing-pipeline-publish-on-merge:p1:inst-build-packages

      - name: Publish packages in order
        id: publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          PACKAGES='${{ needs.detect-changes.outputs.packages }}'
          PUBLISHED_PACKAGES=()
          SKIPPED_PACKAGES=()

          # @cpt-begin:cpt-hai3-algo-publishing-pipeline-resolve-dist-tag:p1:inst-alpha-tag
          # Determine npm tag based on version (prerelease versions need explicit tag)
          get_npm_tag() {
            local version="$1"
            if [[ "$version" == *"-alpha"* ]]; then
              echo "alpha"
            elif [[ "$version" == *"-beta"* ]]; then
              echo "beta"
            elif [[ "$version" == *"-rc"* ]]; then
              echo "next"
            else
              echo "latest"
            fi
          }
          # @cpt-end:cpt-hai3-algo-publishing-pipeline-resolve-dist-tag:p1:inst-alpha-tag

          # @cpt-begin:cpt-hai3-algo-publishing-pipeline-publish-with-retry:p1:inst-init-retry
          # Retry function with exponential backoff
          publish_with_retry() {
            local tag="$1"
            local max_attempts=3
            local attempt=1
            local delay=5

            while [ $attempt -le $max_attempts ]; do
              echo "Publish attempt $attempt of $max_attempts..."
              # @cpt-begin:cpt-hai3-algo-publishing-pipeline-publish-with-retry:p1:inst-run-publish
              if npm publish --access public --tag "$tag"; then
                return 0
              fi
              # @cpt-end:cpt-hai3-algo-publishing-pipeline-publish-with-retry:p1:inst-run-publish

              # @cpt-begin:cpt-hai3-algo-publishing-pipeline-publish-with-retry:p1:inst-retry-backoff
              if [ $attempt -lt $max_attempts ]; then
                echo "Attempt $attempt failed. Retrying in ${delay}s..."
                sleep $delay
                delay=$((delay * 2))  # Exponential backoff: 5s, 10s, 20s
              fi
              attempt=$((attempt + 1))
              # @cpt-end:cpt-hai3-algo-publishing-pipeline-publish-with-retry:p1:inst-retry-backoff
            done

            # @cpt-begin:cpt-hai3-algo-publishing-pipeline-publish-with-retry:p1:inst-exhausted
            echo "All $max_attempts attempts failed"
            return 1
            # @cpt-end:cpt-hai3-algo-publishing-pipeline-publish-with-retry:p1:inst-exhausted
          }
          # @cpt-end:cpt-hai3-algo-publishing-pipeline-publish-with-retry:p1:inst-init-retry

          # @cpt-begin:cpt-hai3-flow-publishing-pipeline-publish-on-merge:p1:inst-sort-by-layer
          # @cpt-begin:cpt-hai3-algo-publishing-pipeline-layer-sort:p1:inst-assign-key
          # Sort packages by layer (L1=SDK, L2=Framework, L3=React, L4=Studio, L5=CLI)
          SORTED=$(echo "$PACKAGES" | jq -c 'sort_by(.dir |
            if . == "state" or . == "screensets" or . == "api" or . == "i18n" or . == "uikit" then 1
            elif . == "framework" then 2
            elif . == "react" then 3
            elif . == "studio" then 4
            else 5 end)')
          # @cpt-end:cpt-hai3-algo-publishing-pipeline-layer-sort:p1:inst-assign-key

          # @cpt-begin:cpt-hai3-algo-publishing-pipeline-layer-sort:p1:inst-sort-asc
          echo "Publishing order:"
          echo "$SORTED" | jq -r '.[] | "  - \(.name)@\(.version)"'
          # @cpt-end:cpt-hai3-algo-publishing-pipeline-layer-sort:p1:inst-sort-asc
          # @cpt-end:cpt-hai3-flow-publishing-pipeline-publish-on-merge:p1:inst-sort-by-layer

          # @cpt-begin:cpt-hai3-flow-publishing-pipeline-publish-on-merge:p1:inst-publish-each
          # Publish each package
          for row in $(echo "$SORTED" | jq -r '.[] | @base64'); do
            _jq() {
              echo "${row}" | base64 --decode | jq -r "${1}"
            }

            NAME=$(_jq '.name')
            DIR=$(_jq '.dir')
            VERSION=$(_jq '.version')

            echo ""
            echo "=========================================="
            echo "Processing: $NAME@$VERSION"
            echo "=========================================="

            # @cpt-begin:cpt-hai3-flow-publishing-pipeline-publish-single-package:p1:inst-npm-view
            # @cpt-begin:cpt-hai3-dod-publishing-pipeline-idempotent-check:p1:inst-skip-check
            # @cpt-begin:cpt-hai3-state-publishing-pipeline-package-publish:p1:inst-pkg-checking
            # Check if version already exists on NPM
            if npm view "$NAME@$VERSION" version 2>/dev/null; then
              # @cpt-begin:cpt-hai3-flow-publishing-pipeline-publish-single-package:p1:inst-skip-existing
              # @cpt-begin:cpt-hai3-state-publishing-pipeline-package-publish:p1:inst-pkg-skip
              echo "SKIPPING: $NAME@$VERSION already exists on NPM"
              SKIPPED_PACKAGES+=("{\"name\":\"$NAME\",\"version\":\"$VERSION\",\"reason\":\"already exists on NPM\"}")
              continue
              # @cpt-end:cpt-hai3-state-publishing-pipeline-package-publish:p1:inst-pkg-skip
              # @cpt-end:cpt-hai3-flow-publishing-pipeline-publish-single-package:p1:inst-skip-existing
            fi
            # @cpt-end:cpt-hai3-state-publishing-pipeline-package-publish:p1:inst-pkg-checking
            # @cpt-end:cpt-hai3-dod-publishing-pipeline-idempotent-check:p1:inst-skip-check
            # @cpt-end:cpt-hai3-flow-publishing-pipeline-publish-single-package:p1:inst-npm-view

            # @cpt-begin:cpt-hai3-flow-publishing-pipeline-publish-single-package:p1:inst-resolve-tag
            NPM_TAG=$(get_npm_tag "$VERSION")
            echo "Publishing $NAME@$VERSION with tag '$NPM_TAG'..."
            # @cpt-end:cpt-hai3-flow-publishing-pipeline-publish-single-package:p1:inst-resolve-tag

            # @cpt-begin:cpt-hai3-flow-publishing-pipeline-publish-single-package:p1:inst-cd-pkg
            cd "packages/$DIR"
            # @cpt-end:cpt-hai3-flow-publishing-pipeline-publish-single-package:p1:inst-cd-pkg

            # @cpt-begin:cpt-hai3-flow-publishing-pipeline-publish-single-package:p1:inst-call-retry-algo
            # @cpt-begin:cpt-hai3-state-publishing-pipeline-package-publish:p1:inst-pkg-publish
            if ! publish_with_retry "$NPM_TAG"; then
              # @cpt-begin:cpt-hai3-flow-publishing-pipeline-publish-single-package:p1:inst-fail-fast
              # @cpt-begin:cpt-hai3-state-publishing-pipeline-workflow-run:p1:inst-publish-failed
              echo "FAILED: $NAME@$VERSION publish failed after retries"
              exit 1
              # @cpt-end:cpt-hai3-state-publishing-pipeline-workflow-run:p1:inst-publish-failed
              # @cpt-end:cpt-hai3-flow-publishing-pipeline-publish-single-package:p1:inst-fail-fast
            fi
            # @cpt-end:cpt-hai3-state-publishing-pipeline-package-publish:p1:inst-pkg-publish
            # @cpt-end:cpt-hai3-flow-publishing-pipeline-publish-single-package:p1:inst-call-retry-algo

            # @cpt-begin:cpt-hai3-flow-publishing-pipeline-publish-single-package:p1:inst-record-success
            # @cpt-begin:cpt-hai3-state-publishing-pipeline-package-publish:p1:inst-pkg-published
            echo "SUCCESS: Published $NAME@$VERSION"
            PUBLISHED_PACKAGES+=("{\"name\":\"$NAME\",\"version\":\"$VERSION\"}")
            cd ../..
            # @cpt-end:cpt-hai3-state-publishing-pipeline-package-publish:p1:inst-pkg-published
            # @cpt-end:cpt-hai3-flow-publishing-pipeline-publish-single-package:p1:inst-record-success
          done
          # @cpt-end:cpt-hai3-flow-publishing-pipeline-publish-on-merge:p1:inst-publish-each

          echo ""
          echo "=========================================="
          echo "All packages published successfully!"
          echo "=========================================="

          # Output results for summary job (use -c for compact single-line JSON)
          if [ ${#PUBLISHED_PACKAGES[@]} -eq 0 ]; then
            echo "published=[]" >> $GITHUB_OUTPUT
          else
            PUBLISHED_JSON=$(printf '%s\n' "${PUBLISHED_PACKAGES[@]}" | jq -sc '.')
            echo "published=$PUBLISHED_JSON" >> $GITHUB_OUTPUT
          fi

          if [ ${#SKIPPED_PACKAGES[@]} -eq 0 ]; then
            echo "skipped=[]" >> $GITHUB_OUTPUT
          else
            SKIPPED_JSON=$(printf '%s\n' "${SKIPPED_PACKAGES[@]}" | jq -sc '.')
            echo "skipped=$SKIPPED_JSON" >> $GITHUB_OUTPUT
          fi
  # @cpt-end:cpt-hai3-dod-publishing-pipeline-idempotent-check:p1:inst-1
  # @cpt-end:cpt-hai3-state-publishing-pipeline-package-publish:p1:inst-1
  # @cpt-end:cpt-hai3-state-publishing-pipeline-workflow-run:p1:inst-2
  # @cpt-end:cpt-hai3-algo-publishing-pipeline-layer-sort:p1:inst-1
  # @cpt-end:cpt-hai3-algo-publishing-pipeline-publish-with-retry:p1:inst-1
  # @cpt-end:cpt-hai3-algo-publishing-pipeline-resolve-dist-tag:p1:inst-1
  # @cpt-end:cpt-hai3-flow-publishing-pipeline-publish-single-package:p1:inst-1
  # @cpt-end:cpt-hai3-flow-publishing-pipeline-publish-on-merge:p1:inst-2

  # @cpt-begin:cpt-hai3-flow-publishing-pipeline-publish-on-merge:p1:inst-summary
  # @cpt-begin:cpt-hai3-state-publishing-pipeline-workflow-run:p1:inst-all-done
  summary:
    needs: [detect-changes, publish]
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Publish summary
        run: |
          echo "## Publish Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ needs.detect-changes.outputs.has_changes }}" != "true" ]; then
            echo "No packages with version changes to publish." >> $GITHUB_STEP_SUMMARY
          elif [ "${{ needs.publish.result }}" == "success" ]; then
            # Published packages
            PUBLISHED='${{ needs.publish.outputs.published }}'
            PUBLISHED_COUNT=$(echo "$PUBLISHED" | jq 'length')
            if [ "$PUBLISHED_COUNT" -gt 0 ]; then
              echo "### ✅ Published ($PUBLISHED_COUNT)" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "$PUBLISHED" | jq -r '.[] | "- `\(.name)@\(.version)`"' >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
            fi

            # Skipped packages
            SKIPPED='${{ needs.publish.outputs.skipped }}'
            SKIPPED_COUNT=$(echo "$SKIPPED" | jq 'length')
            if [ "$SKIPPED_COUNT" -gt 0 ]; then
              echo "### ⏭️ Skipped ($SKIPPED_COUNT)" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "$SKIPPED" | jq -r '.[] | "- `\(.name)@\(.version)` - \(.reason)"' >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "❌ Publish failed. Check workflow logs for details." >> $GITHUB_STEP_SUMMARY
          fi
  # @cpt-end:cpt-hai3-state-publishing-pipeline-workflow-run:p1:inst-all-done
  # @cpt-end:cpt-hai3-flow-publishing-pipeline-publish-on-merge:p1:inst-summary
